name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AUTH_SECRET=build-time-placeholder
            NEXTAUTH_URL=https://sesame.adrianaybar.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy redeploy
        if: github.ref == 'refs/heads/main'
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          APPLICATION_ID: ${{ secrets.DOKPLOY_APP_ID }}
        run: |
          if [ -n "$DOKPLOY_URL" ] && [ -n "$DOKPLOY_TOKEN" ]; then
            curl -s -X POST "${DOKPLOY_URL}/api/trpc/application.deploy" \
              -H "x-api-key: ${DOKPLOY_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"json\":{\"applicationId\":\"${APPLICATION_ID}\"}}" \
              && echo "Redeploy triggered" || echo "Redeploy trigger failed (non-fatal)"
          fi
