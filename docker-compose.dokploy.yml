version: '3.8'

# ─── Dokploy Production Compose ────────────────────────────────────────────
# Dokploy handles SSL + reverse proxy via Traefik — no nginx needed here.
# Set all env vars in Dokploy dashboard → Project → Environment Variables.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AUTH_SECRET: ${AUTH_SECRET}
        NEXTAUTH_URL: ${NEXTAUTH_URL}
    environment:
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXTAUTH_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DATABASE_URL: ${DATABASE_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.sesame-hr.rule=Host(`${DOMAIN:-sesame.15.237.213.46.nip.io}`)"
      - "traefik.http.routers.sesame-hr.entrypoints=websecure"
      - "traefik.http.routers.sesame-hr.tls=true"
      - "traefik.http.routers.sesame-hr.tls.certresolver=letsencrypt"
      - "traefik.http.services.sesame-hr.loadbalancer.server.port=3000"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.sesame-hr-http.rule=Host(`${DOMAIN:-sesame.15.237.213.46.nip.io}`)"
      - "traefik.http.routers.sesame-hr-http.entrypoints=web"
      - "traefik.http.routers.sesame-hr-http.middlewares=redirect-to-https@docker"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
